<form id="admissionForm">

<input type="text" id="name" placeholder="Full Name" required>

<input type="tel" id="phone" placeholder="Phone Number" required>

<input type="email" id="email" placeholder="Email ID" required>

<select id="course" required>
<option value="">Select Course</option>
<option>Regular Schooling</option>
<option>Open Board (NIOS / MP Open)</option>
<option>Distance Education</option>
<option>Computer Training</option>
<option>Teacher Training</option>
<option>Fashion Designing</option>
<option>Mehndi Design</option>
</select>

<input type="text" id="qualification" placeholder="Last Qualification">

<textarea id="message" placeholder="Your Message"></textarea>

<button type="submit">Submit Application</button>

<p id="formMessage" style="margin-top:10px;"></p>

</form>
