<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WINGS Role Dashboard</title>

<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
.dashboard-container{
  max-width:1100px;
  margin:50px auto;
  background:#ffffff;
  padding:35px;
  border-radius:12px;
  box-shadow:0 8px 30px rgba(0,0,0,0.08);
}
.dashboard-container h2{
  color:#003087;
  margin-bottom:10px;
}
.section{
  margin-top:35px;
}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}
table, th, td{
  border:1px solid #e0e0e0;
}
th{
  background:#003087;
  color:white;
}
th, td{
  padding:10px;
  text-align:left;
}
.logout-btn{
  margin-top:30px;
  background:#ffd700;
  border:none;
  padding:12px 25px;
  font-weight:bold;
  cursor:pointer;
  border-radius:30px;
}
.logout-btn:hover{
  background:#003087;
  color:white;
}
</style>

</head>
<body>

<div class="dashboard-container">

<h2>WINGS Dashboard</h2>
<p id="roleInfo"></p>

<div class="section">
<h3>Student Progress</h3>
<div id="progressArea"></div>
<canvas id="attendanceChart"></canvas>
</div>

<div class="section">
<h3>Fee Status</h3>
<div id="feeArea"></div>
</div>

<div class="section">
<h3>Notice Board</h3>
<div id="noticeArea"></div>
</div>

<button onclick="logout()" class="logout-btn">Logout</button>

</div>

<script src="js/role-dashboard.js"></script>
</body>
</html>
