```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WINGS Admin Panel</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}
.sidebar{
width:240px;height:100vh;background:#003087;color:white;
position:fixed;padding:20px;
}
.sidebar h2{color:#ffd700;}
.sidebar a{
display:block;color:white;text-decoration:none;
margin:12px 0;cursor:pointer;
}
.sidebar a:hover{color:#ffd700;}
.content{margin-left:260px;padding:25px;}
.section{display:none;}
.active{display:block;}
table{
width:100%;border-collapse:collapse;background:white;margin-top:10px;
}
table,th,td{border:1px solid #ddd;}
th,td{padding:8px;text-align:left;}
th{background:#003087;color:white;}
button{
padding:8px 15px;margin-top:8px;background:#ffd700;border:none;cursor:pointer;
}
button:hover{background:#ffcc00;}
textarea,input,select{
width:100%;padding:8px;margin-top:8px;
}
hr{margin:20px 0;}
</style>
</head>

<body>

<div class="sidebar">
<h2>WINGS Admin</h2>
<a href="#" onclick="showSection('dashboard')">Dashboard</a>
<a href="#" onclick="showSection('students')">Students</a>
<a href="#" onclick="showSection('progress')">Student Progress</a>
<a href="#" onclick="showSection('teachers')">Teacher Attendance</a>
<a href="#" onclick="showSection('finance')">Finance</a>
<a href="#" onclick="showSection('communication')">Communication Tools</a>
<a href="#" onclick="logout()">Logout</a>
</div>

<div class="content">

<div id="dashboard" class="section active">
<h2>Dashboard</h2>
<div id="summary">Loading...</div>
</div>

<div id="students" class="section">
<h2>Student List</h2>
<table id="studentTable"></table>
</div>

<div id="progress" class="section">
<h2>Student Progress</h2>
<table id="progressTable"></table>
</div>

<div id="teachers" class="section">
<h2>Teacher Attendance</h2>
<table id="teacherTable"></table>
</div>

<div id="finance" class="section">
<h2>Income & Expense</h2>
<table id="financeTable"></table>
<h3 id="balance"></h3>
</div>

<div id="communication" class="section">
<h2>Send Message</h2>

<select id="msgType">
<option>All Students</option>
<option>Class Wise</option>
<option>Old Students</option>
<option>Parents</option>
</select>

<textarea id="msgText" rows="3" placeholder="Type message"></textarea>
<button onclick="sendMessage()">Send Message</button>

<hr>

<h3>Speech Generator</h3>
<input type="text" id="speechTopic" placeholder="Enter topic">
<button onclick="generateSpeech()">Generate Speech</button>

<hr>

<h3>English ⇄ Hindi Converter (Demo)</h3>
<select id="convertType">
<option value="en-hi">English to Hindi</option>
<option value="hi-en">Hindi to English</option>
</select>

<textarea id="convertInput" rows="3" placeholder="Enter text"></textarea>
<button onclick="convertText()">Convert</button>
<textarea id="convertOutput" rows="3" placeholder="Result"></textarea>

</div>

</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

/* ROLE PROTECTION */
if(localStorage.getItem("role") !== "admin"){
    window.location.href="login.html";
    return;
}

const API="https://sheetdb.io/api/v1/58f61be4dda40";

/* Section Switch */
window.showSection=function(id){
document.querySelectorAll('.section').forEach(sec=>sec.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* Logout */
window.logout=function(){
localStorage.clear();
window.location.href="login.html";
}

/* Safe Sheet Loader */
function loadSheet(sheetName,tableId){
fetch(API+"?sheet="+sheetName)
.then(res=>{
if(!res.ok) throw new Error("Network error");
return res.json();
})
.then(data=>{
const table=document.getElementById(tableId);
if(!data || data.length===0){
table.innerHTML="<tr><td>No Data Found</td></tr>";
return;
}
let html="<tr>";
Object.keys(data[0]).forEach(key=>html+="<th>"+key+"</th>");
html+="</tr>";
data.forEach(row=>{
html+="<tr>";
Object.values(row).forEach(val=>html+="<td>"+(val||"")+"</td>");
html+="</tr>";
});
table.innerHTML=html;
})
.catch(()=>{
document.getElementById(tableId).innerHTML="<tr><td>Error Loading Data</td></tr>";
});
}

/* Dashboard Summary */
fetch(API+"?sheet=Students")
.then(res=>res.json())
.then(data=>{
document.getElementById("summary").innerHTML=
"<h3>Total Students: "+(data?data.length:0)+"</h3>";
})
.catch(()=>{
document.getElementById("summary").innerHTML="Error Loading Dashboard";
});

/* Load Sheets */
loadSheet("Students","studentTable");
loadSheet("Progress","progressTable");
loadSheet("Teachers_Attendance","teacherTable");

/* Finance */
fetch(API+"?sheet=Income_Expense")
.then(res=>res.json())
.then(data=>{
if(!data||data.length===0){
document.getElementById("financeTable").innerHTML="<tr><td>No Finance Data</td></tr>";
return;
}
let income=0,expense=0,html="<tr>";
Object.keys(data[0]).forEach(key=>html+="<th>"+key+"</th>");
html+="</tr>";
data.forEach(row=>{
html+="<tr>";
Object.values(row).forEach(val=>html+="<td>"+(val||"")+"</td>");
html+="</tr>";
if(row.Type==="Income") income+=parseFloat(row.Amount||0);
if(row.Type==="Expense") expense+=parseFloat(row.Amount||0);
});
document.getElementById("financeTable").innerHTML=html;
document.getElementById("balance").innerText="Current Balance: ₹"+(income-expense);
})
.catch(()=>{
document.getElementById("financeTable").innerHTML="<tr><td>Error Loading Finance</td></tr>";
});

/* Message Save */
window.sendMessage=function(){
const type=document.getElementById("msgType").value;
const text=document.getElementById("msgText").value;
if(!text){alert("Enter message");return;}

fetch(API+"?sheet=Messages",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({data:[{Type:type,Message:text}]})
})
.then(()=>alert("Message Saved"))
.catch(()=>alert("Error Saving Message"));

window.open("https://wa.me/917869232331?text="+encodeURIComponent(text));
}

/* Speech Generator */
window.generateSpeech=function(){
const topic=document.getElementById("speechTopic").value;
if(!topic){alert("Enter topic");return;}
document.getElementById("msgText").value=
"Respected teachers and dear friends, today I would like to speak about "
+topic+
". This topic plays an important role in our life. If we understand it properly, we can improve ourselves and our society. Thank you.";
}

/* Converter */
window.convertText=function(){
const input=document.getElementById("convertInput").value;
if(!input){alert("Enter text");return;}
document.getElementById("convertOutput").value=
"⚠ Demo Mode Translation:\n\n"+input;
}

});

</script>

</body>
</html>
```
