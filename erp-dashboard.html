<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WINGS ERP Dashboard</title>

<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
.dashboard-container{
  max-width:1100px;
  margin:60px auto;
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 6px 25px rgba(0,0,0,0.08);
}

.dashboard-container h2{
  color:#003087;
  margin-bottom:10px;
}

.section{
  margin-top:40px;
}

.section h3{
  margin-bottom:10px;
  color:#003087;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

table, th, td{
  border:1px solid #ddd;
}

th{
  background:#003087;
  color:white;
}

th, td{
  padding:10px;
  text-align:left;
}

.empty-box{
  padding:15px;
  background:#f4f6f9;
  border-left:4px solid #003087;
}

.logout-btn{
  margin-top:30px;
  background:#ffd700;
  border:none;
  padding:10px 22px;
  font-weight:bold;
  cursor:pointer;
  border-radius:20px;
}

.logout-btn:hover{
  background:#003087;
  color:white;
}
</style>

</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">
    <span>WINGS ERP</span>
  </div>
  <ul class="nav-menu">
    <li><a href="index.html">Home</a></li>
    <li><a href="admin.html">Admin Panel</a></li>
  </ul>
</nav>

<div class="dashboard-container">

<h2>Role Dashboard</h2>
<p id="roleInfo"></p>

<div class="section">
<h3>Progress</h3>
<div id="progressArea"></div>
<canvas id="attendanceChart" style="margin-top:20px;"></canvas>
</div>

<div class="section">
<h3>Fee Status</h3>
<div id="feeArea"></div>
</div>

<div class="section">
<h3>Notice Board</h3>
<div id="noticeArea"></div>
</div>

<button onclick="logout()" class="logout-btn">Logout</button>

</div>

<script src="js/dashboard.js"></script>
</body>
</html>
